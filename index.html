<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Page</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: #333;
            text-align: center;
        }

        header {
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 20px;
        }

        main {
            padding: 40px 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 20px auto;
            max-width: 500px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #4facfe;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #007acc;
        }

        footer {
            margin-top: 40px;
            padding: 10px;
            font-size: 14px;
            color: white;
        }
    </style>
</head>

<body>

<header>
    <h1>Welcome to My Teaching Page</h1>
    <p>Learning HTML Made Simple</p>
</header>

<main>
    <div class="card">
        <h2>Hello Students 👋</h2>
        <p>This is a simple HTML welcome page example.</p>
        <p>You can learn structure, styling, and basic elements here.</p>

        <button onclick="showMessage()">Click Me</button>
        <p id="message"></p>
    </div>
</main>

<footer>
    <p>© 2026 Your Name | Teaching Demo</p>
</footer>

<script>
    function showMessage() {
        document.getElementById("message").innerText = "You clicked the button! 🎉";
    }
</script>

</body>
</html>
